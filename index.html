<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Genius Library - Attendance Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&family=Orbitron:wght=500;700&family=Playfair+Display:ital,wght=0,600;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --surface: rgba(255, 255, 255, 0.06);
            --surface-blur: blur(16px);
            --border-glow: rgba(255, 255, 255, 0.1);
            --primary-glow: #6366f1;
            --success-glow: #10b981;
            --danger-glow: #ef4444;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-gradient); min-height: 100vh; color: var(--text-light); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; overflow: hidden; position: relative; }

        /* Splash Screen Animation */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #090d16; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .splash-title { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 600; letter-spacing: 1px; background: linear-gradient(to right, #ffffff, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        .book-loader { position: relative; width: 60px; height: 45px; perspective: 150px; }
        .book-page { position: absolute; left: 50%; width: 50%; height: 100%; border: 2px solid #818cf8; border-left: none; border-radius: 0 4px 4px 0; background: #1e1b4b; transform-origin: left center; animation: flipPage 1.4s infinite linear; }
        .book-page:nth-child(1) { animation-delay: 0s; }
        .book-page:nth-child(2) { animation-delay: 0.3s; }
        .book-page:nth-child(3) { animation-delay: 0.6s; }
        .book-base { position: absolute; width: 100%; height: 4px; background: #4f46e5; bottom: -5px; border-radius: 2px; box-shadow: 0 0 12px rgba(79, 70, 229, 0.6); }

        .admin-gateway { position: absolute; top: 20px; right: 20px; width: 42px; height: 42px; background: var(--surface); backdrop-filter: var(--surface-blur); border: 1px solid var(--border-glow); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: var(--text-muted); text-decoration: none; transition: all 0.3s ease; }
        .admin-gateway:hover { color: var(--primary-glow); border-color: var(--primary-glow); transform: rotate(45deg); }

        /* Main Portal Card */
        .portal-card { background: var(--surface); backdrop-filter: var(--surface-blur); border: 1px solid var(--border-glow); padding: 35px 25px; border-radius: 24px; width: 100%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); text-align: center; }
        .clock-container { margin-bottom: 25px; }
        #digital-clock { font-family: 'Orbitron', sans-serif; font-size: 38px; font-weight: 700; color: var(--text-light); letter-spacing: 2px; text-shadow: 0 0 12px rgba(99, 102, 241, 0.4); }
        #digital-date { font-size: 13px; color: var(--text-muted); font-weight: 500; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }

        .portal-header h2 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; color: #fff; }
        .portal-header p { font-size: 13px; color: var(--text-muted); margin-bottom: 25px; }

        .input-group { position: relative; margin-bottom: 25px; }
        .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; }
        .student-input { width: 100%; padding: 15px 15px 15px 48px; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border-glow); border-radius: 12px; color: white; font-size: 15px; font-weight: 500; outline: none; transition: all 0.3s ease; }
        .student-input:focus { border-color: var(--primary-glow); background: rgba(0, 0, 0, 0.3); }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .action-btn { border: none; padding: 16px; border-radius: 14px; font-size: 14px; font-weight: 700; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .action-btn i { font-size: 20px; }
        
        .btn-in { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .btn-out { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .btn-map { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); width: 100%; margin-top: 5px; }

        .status-message { min-height: 40px; font-size: 14px; font-weight: 600; margin-top: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; }
        .msg-success { color: #34d399; }
        .msg-error { color: #f87171; }
        .sub-msg { font-size: 11px; color: var(--text-muted); font-weight: 400; }

        /* Modal Layout */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: #0f172a; border: 1px solid #334155; padding: 25px; border-radius: 20px; width: 100%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); position: relative; }
        .hidden { display: none !important; }
        .close-btn { position: absolute; top: 15px; right: 20px; cursor: pointer; color: var(--text-muted); font-size: 24px; transition: 0.2s; }
        .close-btn:hover { color: #fff; }

        @keyframes flipPage { 0% { transform: rotateY(0deg); opacity: 1; } 80% { opacity: 1; } 100% { transform: rotateY(-180deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 class="splash-title">Genius Library</h1>
        <div class="book-loader" style="margin-bottom: 30px;">
            <div class="book-page"></div><div class="book-page"></div><div class="book-page"></div><div class="book-base"></div>
        </div>
        <div id="quote-box" style="color: #94a3b8; font-style: italic; font-size: 14px; padding: 0 35px; text-align: center; max-width: 360px; font-weight: 500; line-height: 1.5;"></div>
    </div>

    <a href="admin.html" class="admin-gateway" title="Admin Control Room"><i class="fa-solid fa-gear"></i></a>

    <div class="portal-card">
        <div class="clock-container">
            <div id="digital-clock">00:00:00</div>
            <div id="digital-date">Loading System...</div>
        </div>

        <div class="portal-header">
            <h2>Genius Library</h2>
            <p>Enter Unique ID or Registered Name to log presence</p>
        </div>

        <div class="input-group">
            <input type="text" id="studentId" class="student-input" placeholder="e.g. GL-1001 or Rahul Kumar" autocomplete="off">
            <i class="fa-solid fa-user-check input-icon"></i>
        </div>

        <div class="action-grid">
            <button class="action-btn btn-in" onclick="markAttendance('Check-In')"><i class="fa-solid fa-fingerprint"></i> Check-In</button>
            <button class="action-btn btn-out" onclick="markAttendance('Check-Out')"><i class="fa-solid fa-door-open"></i> Check-Out</button>
        </div>

        <button class="action-btn btn-map" onclick="toggleSeatMap()"><i class="fa-solid fa-chair"></i> View Live Seat Map</button>
        <div id="status-display" class="status-message"></div>
    </div>

    <div id="seatMapModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="closeSeatMap()">&times;</span>
            <h3 style="margin-bottom: 20px; color: #fff; text-align: center;"><i class="fa-solid fa-border-all"></i> Live Seat Availability</h3>
            <div id="seat-grid-container" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-height: 320px; overflow-y: auto; padding-right: 5px;"></div>
            <div style="display: flex; justify-content: center; gap: 15px; margin-top: 20px; font-size: 12px;">
                <span style="color: #10b981;"><i class="fa-solid fa-square"></i> Available</span>
                <span style="color: #ef4444;"><i class="fa-solid fa-square"></i> Occupied</span>
            </div>
        </div>
    </div>
    <script>
        // ================= FIREBASE REALTIME BACKEND SETUP =================
        const DB_URL = "https://genius-library-bcc4a-default-rtdb.firebaseio.com/";

        // ग्लोबल कैश मैकेनिज्म (पेज लोड होते ही डेटा सिंक रहेगा)
        let localAdmissionCache = [];

        async function fetchFromDB(node) {
            try {
                let response = await fetch(`${DB_URL}${node}.json`);
                return response.ok ? await response.json() : null;
            } catch (e) { console.error(e); return null; }
        }

        async function saveToDB(node, data) {
            try {
                await fetch(`${DB_URL}${node}.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } catch (e) { console.error(e); }
        }

        const quotes = [
            "Success is no accident. It is hard work and perseverance.",
            "Your future is created by what you do today, not tomorrow.",
            "The expert in anything was once a beginner.",
            "Dream big, work hard, stay focused.",
            "Education is the most powerful weapon to change the world.",
            "Small steps every day lead to big results.",
            "Believe in yourself and you are halfway there."
        ];

        // बैकग्राउंड लोडिंग इंजन: पेज खुलते ही एडमिशन लिस्ट लाकर रख लेगा
        window.addEventListener('DOMContentLoaded', async () => {
            const quoteBox = document.getElementById("quote-box");
            if(quoteBox) quoteBox.innerText = quotes[Math.floor(Math.random() * quotes.length)];
            
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if(splash) { splash.style.opacity = '0'; splash.style.pointerEvents = 'none'; setTimeout(() => { splash.remove(); }, 600); }
            }, 3000);

            // बैकग्राउंड में एडमिशन रिकॉर्ड मेमोरी में लोड कर लो ताकि मार्क करते समय डिले न हो
            let cachedRecords = await fetchFromDB("admissionRecords") || [];
            localAdmissionCache = Array.isArray(cachedRecords) ? cachedRecords : Object.values(cachedRecords).filter(Boolean);
        });

        function updateClock() {
            const clockEl = document.getElementById("digital-clock"); const dateEl = document.getElementById("digital-date"); if(!clockEl || !dateEl) return;
            const now = new Date(); let hours = String(now.getHours()).padStart(2, '0'); let minutes = String(now.getMinutes()).padStart(2, '0'); let seconds = String(now.getSeconds()).padStart(2, '0');
            clockEl.innerText = `${hours}:${minutes}:${seconds}`;
            dateEl.innerText = now.toLocaleDateString('en-IN', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
        }
        setInterval(updateClock, 1000); updateClock();

        // ================= INSTANT ATTENDANCE SUBMISSION ENGINE (0 SECOND DELAY) =================
        async function markAttendance(type) {
            const studentInput = document.getElementById("studentId");
            const userInput = studentInput.value.trim();
            const display = document.getElementById("status-display");

            if (!userInput) {
                display.className = "status-message msg-error";
                display.innerHTML = "<span><i class='fa-solid fa-circle-exclamation'></i> Input field cannot be blank!</span>";
                return;
            }

            // बैकअप रिस्क सेफ्टी: अगर कैश किसी वजह से लोड नहीं हुआ, तो तुरंत फ्रेश लाओ
            if (localAdmissionCache.length === 0) {
                let freshRecords = await fetchFromDB("admissionRecords") || [];
                localAdmissionCache = Array.isArray(freshRecords) ? freshRecords : Object.values(freshRecords).filter(Boolean);
            }

            let studentObj = localAdmissionCache.find(s => 
                s.id.toLowerCase() === userInput.toLowerCase() || 
                s.name.toLowerCase() === userInput.toLowerCase()
            );

            if (!studentObj) {
                display.className = "status-message msg-error";
                display.innerHTML = "<span><i class='fa-solid fa-circle-xmark'></i> Record Not Found! Access Denied.</span>";
                return;
            }

            const verifiedId = studentObj.id.toUpperCase();
            const currentDate = new Date().toLocaleDateString('en-IN');
            const currentTime = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            // ⚡ सुपर फ़ास्ट UI फीडबैक: बिना नेटवर्क का इंतज़ार किए तुरंत स्क्रीन पर हरी बत्ती जला दो!
            display.className = "status-message msg-success";
            if (type === 'Check-In') {
                display.innerHTML = `
                    <span><i class="fa-solid fa-heart" style="color: #10b981;"></i> Welcome, ${studentObj.name}!</span>
                    <span class="sub-msg">ID: ${verifiedId} • Checked-In at ${currentTime}</span>
                `;
            } else {
                display.innerHTML = `
                    <span><i class="fa-solid fa-hand-peace" style="color: #f59e0b;"></i> Goodbye, ${studentObj.name}!</span>
                    <span class="sub-msg">ID: ${verifiedId} • Checked-Out at ${currentTime}</span>
                `;
            }
            studentInput.value = "";

            // 🔄 बैकग्राउंड सिंकिंग लॉजिक (जावास्क्रिप्ट एसिंक मोड में डेटाबेस को अपडेट करता रहेगा)
            (async () => {
                let logs = await fetchFromDB("attendanceLogs") || [];
                if(!Array.isArray(logs)) logs = Object.values(logs).filter(Boolean);

                const alreadyDone = logs.some(log => log.id === verifiedId && log.date === currentDate && log.type === type);
                if (!alreadyDone) {
                    logs.push({ id: verifiedId, name: studentObj.name, date: currentDate, time: currentTime, type: type });
                    await saveToDB("attendanceLogs", logs);

                    // लाइव सीट मैप के लिए ऑटो स्टेटस सिंक
                    let seatData = await fetchFromDB("seatAllocations") || [];
                    if(!Array.isArray(seatData)) seatData = Object.values(seatData).filter(Boolean);

                    let studentSeatIndex = seatData.findIndex(s => s.studentId.toUpperCase() === verifiedId);
                    if (studentSeatIndex !== -1) {
                        seatData[studentSeatIndex].liveStatus = (type === 'Check-In') ? 'Active' : 'Away';
                        await saveToDB("seatAllocations", seatData);
                    }
                }
            })();

            setTimeout(() => { display.innerText = ""; }, 5000);
        }

        // ================= CLOUD SEAT MAP RENDERING =================
        async function toggleSeatMap() {
            const container = document.getElementById("seat-grid-container"); 
            container.innerHTML = "Loading live status...";
            
            let seatData = await fetchFromDB("seatAllocations") || [];
            if(!Array.isArray(seatData)) seatData = Object.values(seatData).filter(Boolean);
            
            container.innerHTML = "";
            for (let i = 1; i <= 60; i++) {
                // सुधरा हुआ लॉजिक: एडमिन पैनल में भरे गए सिर्फ नंबर इनपुट (e.g., "5") से परफेक्ट मैच करेगा
                let allocation = seatData.find(s => Number(s.seat) === i);
                let isOccupied = false;
                
                if (allocation) {
                    isOccupied = (allocation.liveStatus !== 'Away');
                }
                
                let div = document.createElement("div");
                div.style.padding = "12px 10px"; div.style.borderRadius = "10px"; div.style.textAlign = "center";
                div.style.background = isOccupied ? "rgba(239, 68, 68, 0.2)" : "rgba(16, 185, 129, 0.2)";
                div.style.border = isOccupied ? "1px solid #ef4444" : "1px solid #10b981";
                div.style.color = isOccupied ? "#f87171" : "#34d399";
                div.style.fontWeight = "700"; div.style.fontSize = "14px";
                div.innerText = i; 
                container.appendChild(div);
            }
            document.getElementById("seatMapModal").classList.remove("hidden");
        }
        
        function closeSeatMap() { document.getElementById("seatMapModal").classList.add("hidden"); }
    </script>
</body>
</html>
